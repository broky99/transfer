<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KIS Bridge</title>
  <link rel="stylesheet" href="css/app.css">
  <script defer src="js/github.js"></script>
  <script defer src="js/clipboard.js"></script>
  <script defer src="js/sync.js"></script>
  <script defer src="js/ui.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">KIS Bridge</p>
        <h1>Texttransfer</h1>
      </div>
      <div class="status" aria-live="polite">
        <span id="statusDot" class="status__dot"></span>
        <span id="statusText">Bereit</span>
      </div>
    </header>

    <section class="workspace" aria-label="Texttransfer">
      <form id="transferForm" class="panel panel--editor">
        <label class="field">
          <span>Kategorie</span>
          <select id="category" name="category">
            <option>Anamnese</option>
            <option>Befund</option>
            <option>Verlauf</option>
            <option>Arztbrief</option>
            <option>OP-Bericht</option>
            <option>Sonstiges</option>
          </select>
        </label>

        <label class="field field--grow">
          <span>Text</span>
          <textarea id="text" name="text" placeholder="Text einfuegen oder per iPhone senden"></textarea>
        </label>

        <div class="quick-actions" aria-label="Zwischenablage">
          <button id="clipSendBtn" class="button button--primary" type="button">Zwischenablage senden</button>
          <button id="clipLoadBtn" class="button" type="button">Nur einfuegen</button>
        </div>

        <div class="actions actions--main">
          <button id="sendBtn" class="button button--primary" type="submit">Senden</button>
          <button id="copyBtn" class="button button--success" type="button">Kopieren</button>
          <button id="clearBtn" class="button button--danger" type="button">Loeschen</button>
        </div>

        <div class="actions">
          <button id="loadBtn" class="button" type="button">Laden</button>
          <button id="pasteBtn" class="button" type="button">Einfuegen</button>
          <button id="checkNowBtn" class="button button--accent" type="button">Jetzt pruefen</button>
        </div>

        <p id="lastInfo" class="meta">Noch kein Diktat geladen.</p>
      </form>

      <aside class="side">
        <section class="panel">
          <div class="section-head">
            <h2>Verlauf</h2>
            <button id="clearHistoryBtn" class="icon-button" type="button" title="Verlauf leeren">Leeren</button>
          </div>
          <div id="history" class="history"></div>
        </section>

        <section class="panel">
          <details>
            <summary>Einstellungen</summary>
            <div class="settings-grid">
              <label class="field">
                <span>Owner</span>
                <input id="owner" autocomplete="off" placeholder="broky99">
              </label>
              <label class="field">
                <span>Repo</span>
                <input id="repo" autocomplete="off" placeholder="transfer">
              </label>
              <label class="field">
                <span>Branch</span>
                <input id="branch" autocomplete="off" placeholder="main">
              </label>
              <label class="field">
                <span>Pfad</span>
                <input id="path" autocomplete="off" placeholder="data/payload.json">
              </label>
              <label class="field">
                <span>GitHub Token</span>
                <input id="token" type="password" autocomplete="off" placeholder="github_pat_...">
              </label>
              <label class="field">
                <span>Passwort</span>
                <input id="password" type="password" autocomplete="off" placeholder="lokales Passwort">
              </label>
            </div>
            <div class="actions">
              <button id="saveSettings" class="button button--success" type="button">Speichern</button>
              <button id="testBtn" class="button" type="button">Test</button>
            </div>
          </details>
        </section>

        <section class="panel panel--future" aria-label="Vorbereitet">
          <h2>Vorbereitet</h2>
          <div class="future-grid">
            <span>Queue</span>
            <span>PDF</span>
            <span>Bilder</span>
          </div>
        </section>
      </aside>
    </section>
  </main>
</body>
</html>
